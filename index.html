<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#10182B">
<title>Lecture & Esprit — parcours annuels</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --encre:#10182B; --encre2:#182238; --parchemin:#F7F1E4; --parchemin2:#EFE7D4;
  --or:#C9A227; --or-doux:#E3C866; --texte:#241E14; --texte-inv:#E9E4D6;
  --sourdine:#9AA3B5; --sourdine2:#5A6478; --vert:#5E7C4A; --rouge:#A6533B;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--encre);color:var(--texte-inv);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:16px;line-height:1.5;
  padding-bottom:calc(64px + env(safe-area-inset-bottom))}
h1,h2,h3,.serif{font-family:Georgia,'Times New Roman',serif}
main{max-width:560px;margin:0 auto;padding:16px 16px 8px}
.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--or);font-weight:600}
.muted{color:var(--sourdine)}
button{font:inherit;border:0;cursor:pointer;border-radius:var(--r)}
.btn{background:var(--or);color:var(--encre);font-weight:700;padding:13px 18px;width:100%;font-size:16px}
.btn.secondaire{background:var(--encre2);color:var(--texte-inv);border:1px solid var(--sourdine2)}
.btn.fait{background:var(--vert);color:#fff}
.btn:active{transform:scale(.98)}

.carte{background:var(--parchemin);color:var(--texte);border-radius:var(--r);padding:18px;margin:14px 0;
  box-shadow:0 6px 24px rgba(0,0,0,.35)}
.carte .eyebrow{color:#8A6D12}
.carte .muted{color:#7A705C}

/* Sélecteur de parcours */
.parcours-sel{display:flex;gap:8px;margin:14px 0 4px}
.parcours-sel button{flex:1;padding:10px 8px;border-radius:12px;background:var(--encre2);
  color:var(--sourdine);border:1px solid var(--sourdine2);font-size:13px;font-weight:700;line-height:1.25}
.parcours-sel button.actif{background:rgba(201,162,39,.15);border-color:var(--or);color:var(--or-doux)}
.parcours-sel small{display:block;font-weight:400;font-size:11px;opacity:.8}

/* Anneau */
.anneau-wrap{display:flex;flex-direction:column;align-items:center;padding:14px 0 4px}
.anneau-wrap svg{width:200px;height:200px}
.seg{stroke:var(--sourdine2);stroke-width:7;fill:none;opacity:.55}
.seg.fait{stroke:var(--or);opacity:1}
.seg.actuel{stroke:var(--or-doux);opacity:1;animation:pulse 2.2s ease-in-out infinite}
@keyframes pulse{0%,100%{stroke-width:7}50%{stroke-width:11}}
@media (prefers-reduced-motion:reduce){.seg.actuel{animation:none;stroke-width:10}}
.anneau-centre .gros{font-size:34px;fill:var(--parchemin);font-family:Georgia,serif}
.anneau-centre .petit{font-size:11px;fill:var(--sourdine);letter-spacing:.1em}

nav{position:fixed;bottom:0;left:0;right:0;background:var(--encre2);
  border-top:1px solid rgba(154,163,181,.25);display:flex;z-index:10;
  padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;color:var(--sourdine);padding:9px 0 7px;font-size:11px;
  display:flex;flex-direction:column;align-items:center;gap:2px;border-radius:0}
nav button.actif{color:var(--or)}
nav .ico{font-size:20px;line-height:1}

.trim{margin:14px 0}
.trim summary{list-style:none;cursor:pointer;background:var(--encre2);border-radius:var(--r);
  padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.trim summary::-webkit-details-marker{display:none}
.trim[open] summary{border-radius:var(--r) var(--r) 0 0}
.sem-liste{background:var(--encre2);border-radius:0 0 var(--r) var(--r);padding:4px 0 8px}
.sem{display:flex;align-items:center;gap:12px;padding:11px 16px;border-top:1px solid rgba(154,163,181,.12)}
.sem .num{font-family:Georgia,serif;color:var(--or);min-width:34px;font-weight:700}
.sem .infos{flex:1;min-width:0}
.sem .refs{font-size:14px}
.sem .dates{font-size:12px;color:var(--sourdine)}
.sem .coche{width:26px;height:26px;border-radius:50%;border:2px solid var(--sourdine2);flex:none;
  display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;background:none}
.sem.faite .coche{background:var(--or);border-color:var(--or);color:var(--encre)}
.sem.courante{background:rgba(201,162,39,.10)}
.sem:active{background:rgba(201,162,39,.16)}

.barre-versions{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap}
.puce{padding:8px 14px;border-radius:99px;background:var(--encre2);color:var(--sourdine);
  border:1px solid var(--sourdine2);font-size:13px;font-weight:600}
.puce.active{background:var(--or);color:var(--encre);border-color:var(--or)}
.jour-chips{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap}
.jour-chips .puce{padding:7px 12px;font-size:13px}
.verset{margin:10px 0;font-family:Georgia,serif;font-size:17.5px;line-height:1.65}
.verset .vnum{font-size:11px;color:var(--or);vertical-align:super;font-weight:700;margin-right:5px;font-family:system-ui}
.verset .alt{display:block;margin-top:5px;padding:8px 10px 8px 12px;border-left:3px solid var(--or-doux);
  background:var(--parchemin2);font-size:15.5px;color:#4A4335;border-radius:0 8px 8px 0}
.verset .alt .vlabel{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#8A6D12;
  font-family:system-ui;display:block;margin-bottom:2px}
.question{border-left:3px solid var(--or);padding:10px 12px;margin:14px 0;font-style:italic;
  background:rgba(201,162,39,.08);border-radius:0 8px 8px 0}
.carte .question{background:rgba(140,109,18,.08)}
.note-carte{border-left:3px solid var(--or);background:var(--parchemin2);padding:12px 14px;border-radius:0 10px 10px 0;
  font-family:Georgia,serif;font-size:16px;margin:10px 0;color:#3A3428}
.avertissement{font-size:12px;color:#8A6D12;margin:-4px 0 8px;font-style:italic}

.regl{background:var(--encre2);border-radius:var(--r);padding:16px;margin:12px 0}
.regl label{display:block;font-weight:600;margin-bottom:6px}
.regl input[type=time],.regl select{width:100%;padding:12px;border-radius:10px;border:1px solid var(--sourdine2);
  background:var(--encre);color:var(--texte-inv);font-size:16px}
.note{font-size:13px;color:var(--sourdine);margin-top:8px;line-height:1.45}
.etat{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700;margin-left:6px}
.etat.ok{background:rgba(94,124,74,.25);color:#9FC788}
.etat.non{background:rgba(166,83,59,.22);color:#E0A18C}
.retour{background:none;color:var(--or);font-weight:600;padding:8px 0;font-size:15px}
hr.filet{border:0;border-top:1px solid rgba(154,163,181,.2);margin:16px 0}
.chargement{text-align:center;padding:40px 0;color:var(--sourdine)}
table.regles{width:100%;border-collapse:collapse;font-size:14px;margin:8px 0}
table.regles td{padding:8px;border-top:1px solid rgba(0,0,0,.12);vertical-align:top}
table.regles td:first-child{font-weight:700;white-space:nowrap;color:#8A6D12}
</style>
</head>
<body>
<main id="app"><div class="chargement">Ouverture…</div></main>
<nav id="nav"></nav>

<script>
/* ================= CONSTANTES ================= */
const DEBUT_MANIF = new Date(2026, 6, 18);
const LIVRES = {1:'Genèse',2:'Exode',4:'Nombres',5:'Deutéronome',7:'Juges',9:'1 Samuel',11:'1 Rois',
 16:'Néhémie',18:'Job',19:'Psaume',20:'Proverbes',21:'Ecclésiaste',23:'Ésaïe',24:'Jérémie',
 26:'Ézéchiel',28:'Osée',29:'Joël',30:'Amos',33:'Michée',38:'Zacharie',40:'Matthieu',41:'Marc',
 42:'Luc',43:'Jean',44:'Actes',45:'Romains',46:'1 Corinthiens',47:'2 Corinthiens',48:'Galates',
 49:'Éphésiens',50:'Philippiens',51:'Colossiens',52:'1 Thessaloniciens',55:'2 Timothée',56:'Tite',
 58:'Hébreux',59:'Jacques',60:'1 Pierre',61:'2 Pierre',62:'1 Jean',66:'Apocalypse',
 100:'Sagesse',101:'Siracide'};
const DEUTERO = new Set([100,101]);
const VERSIONS = {
  lsg:{nom:'Segond 1910',fichier:'data/lsg_plan.json'},
  crampon:{nom:'Crampon 1923',fichier:'data/crampon_plan.json'},
  darby:{nom:'Darby',fichier:'data/darby_plan.json'},
  martin:{nom:'Martin 1744',fichier:'data/martin_plan.json'}};
const MOIS = ["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];
const JOURS = ["Lun","Mar","Mer","Jeu","Ven"];

/* ================= ÉTAT & STOCKAGE ================= */
let PLANS = null;
let etat = {
  progres: null, settings: null, textes: {},
  ecran:'aujourdhui', semaineOuverte:null, jourOuvert:0
};
(function initEtat(){
  let prog = JSON.parse(localStorage.getItem('progres2')||'null');
  if(!prog){ // migration depuis la v1
    const ancien = JSON.parse(localStorage.getItem('progres')||'{}');
    prog = {manif:ancien, esprit:{}};
  }
  etat.progres = prog;
  etat.settings = Object.assign(
    {time:'06:00',version:'lsg',comparer:'',notif:true,parcours:'manif',espritDebut:null},
    JSON.parse(localStorage.getItem('settings')||'{}'));
})();
function sauver(){
  localStorage.setItem('progres2',JSON.stringify(etat.progres));
  localStorage.setItem('settings',JSON.stringify(etat.settings));
  kvPut('settings',etat.settings);
}
function idb(){return new Promise((res,rej)=>{const r=indexedDB.open('manif-db',1);
  r.onupgradeneeded=()=>r.result.createObjectStore('kv');
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);});}
async function kvPut(k,v){try{const db=await idb();
  db.transaction('kv','readwrite').objectStore('kv').put(v,k);}catch(e){}}

/* ================= DATES & SEMAINES ================= */
function stripT(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();}
function debutParcours(pid){
  if(pid==='manif') return DEBUT_MANIF;
  return etat.settings.espritDebut ? new Date(etat.settings.espritDebut+'T00:00:00') : null;
}
function semaineCourante(pid){
  const deb = debutParcours(pid);
  if(!deb) return 0;
  const diff = Math.floor((stripT(new Date())-stripT(deb))/86400000);
  if(diff<0) return 0;
  return Math.min(52, Math.floor(diff/7)+1);
}
function datesSemaine(pid,n){
  const deb = debutParcours(pid);
  if(!deb) return '';
  const s=new Date(deb.getTime()+(n-1)*7*86400000), e=new Date(s.getTime()+6*86400000);
  const f=d=>d.getDate()+' '+MOIS[d.getMonth()];
  return f(s)+' – '+f(e)+' '+e.getFullYear();
}
function lundiDeCetteSemaine(){
  const d=new Date(); const j=(d.getDay()+6)%7; // 0=lundi
  d.setDate(d.getDate()-j); d.setHours(0,0,0,0);
  return d;
}
function jourAuj(){ // 0..4 = Lun..Ven ; 5 = Sam ; 6 = Dim
  return (new Date().getDay()+6)%7;
}

/* ================= TEXTES ================= */
async function chargerVersion(v){
  if(etat.textes[v]) return etat.textes[v];
  const rep=await fetch(VERSIONS[v].fichier);
  etat.textes[v]=await rep.json();
  return etat.textes[v];
}
function versets(data,pass){
  const ch=(data[pass[0]]||{})[pass[1]]||{};
  const nums=Object.keys(ch).map(Number).sort((a,b)=>a-b);
  const de=pass[2]||1, a=pass[3]||Infinity;
  return nums.filter(n=>n>=de&&n<=a).map(n=>({n,t:ch[n]}));
}
function refLisible(pass){
  let s=(LIVRES[pass[0]]||('Livre '+pass[0]))+' '+pass[1];
  if(pass[2]) s+=':'+pass[2]+(pass[3]&&pass[3]!==pass[2]?'-'+pass[3]:'');
  return s;
}
function refsSemaineEsprit(s){ // libellé compact des lectures de la semaine
  const refs=[];
  s.d.forEach(day=>day.forEach(p=>{ if(Array.isArray(p)) refs.push(refLisible(p)); }));
  const u=[...new Set(refs.map(x=>x.split(':')[0]))];
  return u.slice(0,3).join(' · ')+(u.length>3?' …':'');
}

/* ================= RENDU ================= */
const app=document.getElementById('app');
const nav=document.getElementById('nav');
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');

function rendreNav(){
  const items=[['aujourdhui','🕯️',"Aujourd'hui"],['plan','📖','Plan'],['lecture','✦','Lecture'],['reglages','⚙︎','Réglages']];
  nav.innerHTML=items.map(([id,ico,lab])=>
    `<button data-e="${id}" class="${etat.ecran===id||('lecture'===id&&etat.ecran==='prieres')?'actif':''}"><span class="ico">${ico}</span>${lab}</button>`).join('');
  nav.querySelectorAll('button').forEach(b=>b.onclick=()=>{etat.ecran=b.dataset.e;
    if(b.dataset.e==='lecture'&&!etat.semaineOuverte) ouvrirSemaineCourante();
    rendre();});
}
function ouvrirSemaineCourante(){
  const pid=etat.settings.parcours;
  etat.semaineOuverte=Math.max(1,semaineCourante(pid)||1);
  etat.jourOuvert=Math.min(4,jourAuj());
}
function selecteurParcours(){
  const p=etat.settings.parcours;
  return `<div class="parcours-sel">
    <button data-p="manif" class="${p==='manif'?'actif':''}">La Manifestation<small>Année 31→32 · lectures datées</small></button>
    <button data-p="esprit" class="${p==='esprit'?'actif':''}">L'Esprit Saint<small>4 piliers · lecture quotidienne</small></button>
  </div>`;
}
function brancherParcours(){
  document.querySelectorAll('.parcours-sel button').forEach(b=>b.onclick=()=>{
    etat.settings.parcours=b.dataset.p; etat.semaineOuverte=null; sauver(); rendre();});
}
function anneauSVG(pid){
  const c=semaineCourante(pid); const R=88,cx=105,cy=105,n=52;
  const prog=etat.progres[pid]||{};
  let segs='';
  for(let i=0;i<n;i++){
    const a0=(-90+i*(360/n)+1.6)*Math.PI/180, a1=(-90+(i+1)*(360/n)-1.6)*Math.PI/180;
    const x0=cx+R*Math.cos(a0),y0=cy+R*Math.sin(a0),x1=cx+R*Math.cos(a1),y1=cy+R*Math.sin(a1);
    const cls=prog[i+1]?'seg fait':(i+1===c?'seg actuel':'seg');
    segs+=`<path class="${cls}" d="M${x0.toFixed(1)},${y0.toFixed(1)} A${R},${R} 0 0 1 ${x1.toFixed(1)},${y1.toFixed(1)}"/>`;
  }
  const faites=Object.keys(prog).length;
  return `<svg viewBox="0 0 210 210">${segs}
    <text class="anneau-centre gros" x="105" y="100" text-anchor="middle">${faites}<tspan class="petit"> /52</tspan></text>
    <text class="anneau-centre petit" x="105" y="122" text-anchor="middle">SEMAINES LUES</text></svg>`;
}

function ecranAujourdhui(){
  const pid=etat.settings.parcours;
  const plan=PLANS[pid];
  const c=semaineCourante(pid);
  let carte='';
  if(pid==='esprit'&&!etat.settings.espritDebut){
    carte=`<div class="carte"><div class="eyebrow">Une année avec l'Esprit Saint</div>
      <h2 class="serif" style="margin:6px 0 4px">Connaître · Recevoir · Manifester · Discerner</h2>
      <p style="margin:6px 0 12px">52 semaines de lecture quotidienne (Lun→Ven), samedi de bilan, examen du soir en 5 points. Le parcours commence le lundi de la semaine où tu le lances.</p>
      <button class="btn" id="btn-demarrer">Commencer cette semaine</button></div>`;
  } else if(c===0){
    const deb=debutParcours(pid);
    const j=Math.ceil((stripT(deb)-stripT(new Date()))/86400000);
    carte=`<div class="carte"><div class="eyebrow">Avant le départ</div>
      <h2 class="serif" style="margin:6px 0">Le parcours commence dans ${j} jour${j>1?'s':''}</h2>
      <p class="muted">Les lectures sont déjà consultables dans l'onglet Plan.</p></div>`;
  } else {
    const s=plan.semaines[c-1];
    if(pid==='manif'){
      carte=`<div class="carte">
        <div class="eyebrow">Semaine ${c} · ${datesSemaine(pid,c)}</div>
        <h2 class="serif" style="margin:6px 0 4px">${esc(s.r)}</h2>
        <div class="question serif">${esc(s.q)}</div>
        <button class="btn" data-lire="${c}">Ouvrir la lecture</button>
        <div style="height:10px"></div>
        <button class="btn ${etat.progres[pid][c]?'fait':'secondaire'}" data-coche="${c}">
          ${etat.progres[pid][c]?'✓ Semaine lue':'Marquer la semaine comme lue'}</button></div>`;
    } else {
      const j=jourAuj();
      const jourTxt = j<=4 ? ('Lecture du jour — '+['lundi','mardi','mercredi','jeudi','vendredi'][j])
                    : (j===5 ? 'Samedi — relecture et bilan de la semaine au carnet'
                             : 'Dimanche — messe et Veni Creator');
      const lectJour = j<=4 ? s.d[j].map(p=>Array.isArray(p)?refLisible(p):'Repère du jour').join(' · ') : '';
      carte=`<div class="carte">
        <div class="eyebrow">Semaine ${c} · ${datesSemaine(pid,c)}</div>
        <h2 class="serif" style="margin:6px 0 2px">${esc(s.th)}</h2>
        <p style="margin:4px 0"><strong>${jourTxt}</strong>${lectJour?' : '+esc(lectJour):''}</p>
        <div class="question serif">${esc(s.q)}</div>
        <button class="btn" data-lire="${c}">Ouvrir la lecture</button>
        <div style="height:10px"></div>
        <button class="btn ${etat.progres[pid][c]?'fait':'secondaire'}" data-coche="${c}">
          ${etat.progres[pid][c]?'✓ Semaine lue':'Marquer la semaine comme lue'}</button></div>`;
    }
  }
  const titre = pid==='manif' ? '« Ta parole est une lampe à mes pieds »' : '« L\u2019Esprit et l\u2019Épouse disent : Viens ! »';
  app.innerHTML=`${selecteurParcours()}
    <h1 class="serif" style="font-size:22px;line-height:1.25;margin:6px 0 0">${titre}</h1>
    <div class="anneau-wrap">${anneauSVG(pid)}</div>
    ${carte}`;
  brancherParcours(); brancherActions();
  const bd=document.getElementById('btn-demarrer');
  if(bd) bd.onclick=()=>{
    const l=lundiDeCetteSemaine();
    etat.settings.espritDebut=l.getFullYear()+'-'+String(l.getMonth()+1).padStart(2,'0')+'-'+String(l.getDate()).padStart(2,'0');
    sauver(); rendre();
  };
}

function ecranPlan(){
  const pid=etat.settings.parcours;
  const plan=PLANS[pid];
  const c=semaineCourante(pid);
  const demarre = pid!=='esprit'||!!etat.settings.espritDebut;
  app.innerHTML=selecteurParcours()+
   `<h1 class="serif" style="font-size:21px;margin:8px 0 4px">${esc(plan.nom)}</h1>
    <p class="muted" style="font-size:14px">Touchez une semaine pour lire. Touchez le rond pour cocher.</p>`+
  plan.trimestres.map((t,ti)=>{
    const ouvert=(c>=t.de+1&&c<=t.a+1)||(c===0&&ti===0);
    const lignes=plan.semaines.slice(t.de,t.a+1).map((s,ix)=>{
      const w=t.de+ix+1;
      const titre = pid==='manif'?s.r:s.th;
      const sous = pid==='manif'?datesSemaine(pid,w):(demarre?datesSemaine(pid,w):refsSemaineEsprit(s));
      return `<div class="sem ${etat.progres[pid][w]?'faite':''} ${w===c?'courante':''}" data-lire="${w}">
        <span class="num">S${w}</span>
        <span class="infos"><span class="refs">${esc(titre)}</span><br><span class="dates">${esc(sous)}</span></span>
        <button class="coche" data-coche="${w}" aria-label="Marquer la semaine ${w}">✓</button></div>`;
    }).join('');
    const nfaites=plan.semaines.slice(t.de,t.a+1).filter((_,ix)=>etat.progres[pid][t.de+ix+1]).length;
    return `<details class="trim" ${ouvert?'open':''}><summary>
      <span><strong>${esc(t.titre)}</strong><br><span class="muted" style="font-size:12px">${esc(t.sous)}</span></span>
      <span class="muted">${nfaites}/13</span>
      </summary><div class="sem-liste">${lignes}</div></details>`;
  }).join('');
  brancherParcours(); brancherActions();
}

async function ecranLecture(){
  const pid=etat.settings.parcours;
  const plan=PLANS[pid];
  if(!etat.semaineOuverte) ouvrirSemaineCourante();
  const w=etat.semaineOuverte;
  const s=plan.semaines[w-1];
  const v1=etat.settings.version, v2=etat.settings.comparer;
  const titre = pid==='manif'?s.r:s.th;
  const jourChips = pid==='esprit'
    ? `<div class="jour-chips">${JOURS.map((j,ix)=>`<button class="puce ${ix===etat.jourOuvert?'active':''}" data-j="${ix}">${j}</button>`).join('')}
       <button class="puce" data-j="prieres">Prières ✦</button></div>` : '';
  app.innerHTML=`
    <button class="retour" id="retour">‹ Plan</button>
    <div class="eyebrow">${esc(plan.nom)} · Semaine ${w}${datesSemaine(pid,w)?' · '+datesSemaine(pid,w):''}</div>
    <h1 class="serif" style="font-size:21px;margin:2px 0 6px">${esc(titre)}</h1>
    ${jourChips}
    <div class="barre-versions" id="vbar">
      ${Object.entries(VERSIONS).map(([k,v])=>`<button class="puce ${k===v1?'active':''}" data-v="${k}">${v.nom}</button>`).join('')}
      <button class="puce ${v2?'active':''}" id="btn-comp">${v2?('⇄ '+VERSIONS[v2].nom):'⇄ Comparer'}</button>
    </div>
    <div id="texte"><div class="chargement">Chargement du texte…</div></div>
    <div class="carte"><div class="eyebrow">Méditation de la semaine</div>
      <div class="question serif">${esc(s.q)}</div>
      <button class="btn ${etat.progres[pid][w]?'fait':''}" data-coche="${w}">${etat.progres[pid][w]?'✓ Semaine lue':'Marquer la semaine comme lue'}</button>
    </div>`;
  document.getElementById('retour').onclick=()=>{etat.ecran='plan';rendre();};
  document.querySelectorAll('#vbar [data-v]').forEach(b=>b.onclick=()=>{
    etat.settings.version=b.dataset.v;
    if(etat.settings.comparer===b.dataset.v) etat.settings.comparer='';
    sauver(); rendre();});
  document.getElementById('btn-comp').onclick=()=>{
    const autres=Object.keys(VERSIONS).filter(k=>k!==etat.settings.version);
    const idx=autres.indexOf(etat.settings.comparer);
    etat.settings.comparer = etat.settings.comparer==='' ? autres[0] : (idx<autres.length-1?autres[idx+1]:'');
    sauver(); rendre();};
  document.querySelectorAll('.jour-chips [data-j]').forEach(b=>b.onclick=()=>{
    if(b.dataset.j==='prieres'){etat.ecran='prieres';rendre();return;}
    etat.jourOuvert=parseInt(b.dataset.j,10); rendre();});
  brancherActions();

  const passages = pid==='manif' ? s.p : s.d[etat.jourOuvert];
  try{
    const d1=await chargerVersion(v1);
    const d2=v2?await chargerVersion(v2):null;
    let dc=null; // fallback deutérocanonique
    if(passages.some(p=>Array.isArray(p)&&DEUTERO.has(p[0])&&v1!=='crampon')) dc=await chargerVersion('crampon');
    const zone=document.getElementById('texte'); if(!zone) return;
    zone.innerHTML=passages.map(pass=>{
      if(!Array.isArray(pass)) return `<div class="note-carte">${esc(pass.n)}</div>`;
      const deutero=DEUTERO.has(pass[0]);
      const src = (deutero&&v1!=='crampon') ? dc : d1;
      const srcNom = (deutero&&v1!=='crampon') ? 'Crampon 1923' : VERSIONS[v1].nom;
      const avert = (deutero&&v1!=='crampon') ? `<div class="avertissement">Livre deutérocanonique — affiché en Crampon 1923 (absent de ${VERSIONS[v1].nom}).</div>` : '';
      const vv=versets(src,pass);
      if(!vv.length) return `<div class="carte">Passage indisponible (${esc(refLisible(pass))}).</div>`;
      const corps=vv.map(x=>{
        let alt='';
        if(d2&&!deutero){
          const m=(d2[pass[0]]&&d2[pass[0]][pass[1]]&&d2[pass[0]][pass[1]][x.n])||'';
          if(m) alt=`<span class="alt"><span class="vlabel">${VERSIONS[v2].nom}</span>${esc(m)}</span>`;
        }
        return `<p class="verset"><span class="vnum">${x.n}</span>${esc(x.t)}${alt}</p>`;
      }).join('');
      return `<div class="carte"><div class="eyebrow">${esc(refLisible(pass))} · ${srcNom}</div>${avert}${corps}</div>`;
    }).join('');
  }catch(e){
    const zone=document.getElementById('texte');
    if(zone) zone.innerHTML=`<div class="carte">Le texte n'a pas pu être chargé. Vérifiez la connexion pour la première ouverture — ensuite tout fonctionne hors-ligne.</div>`;
  }
}

function ecranPrieres(){

      <p class="serif" style="font-style:italic;margin-top:6px">Viens, Esprit Créateur, visite l'âme de tes fidèles, emplis de la grâce d'en haut les cœurs que tu as créés. Toi qu'on nomme le Conseiller, don du Dieu très-haut, source vive, feu, charité, invisible consécration. Tu es l'Esprit aux sept dons, le doigt de la main du Père, l'Esprit de vérité promis par le Père, c'est toi qui inspires nos paroles. Allume en nous ta lumière, emplis d'amour nos cœurs, affermis toujours de ta force la faiblesse de notre corps. Repousse l'ennemi loin de nous, donne-nous ta paix sans retard, pour que, sous ta conduite et ton conseil, nous évitions tout mal et toute erreur. Fais-nous connaître le Père, révèle-nous le Fils, et toi, leur commun Esprit, fais-nous toujours croire en toi. Gloire soit à Dieu le Père, au Fils ressuscité des morts, à l'Esprit Saint Consolateur, maintenant et dans les siècles. Amen.</p></div>

    <div class="carte"><div class="eyebrow">Veni Sancte Spiritus (séquence de Pentecôte, XIIIe s.)</div>
      <p class="serif" style="font-style:italic;margin-top:6px">Viens, Esprit Saint, et envoie du haut du ciel un rayon de ta lumière. Viens, père des pauvres, viens, donateur des dons, viens, lumière des cœurs. Consolateur souverain, hôte très doux de nos âmes, adoucissante fraîcheur. Dans le labeur, le repos ; dans la fièvre, la fraîcheur ; dans les pleurs, le réconfort. Ô lumière bienheureuse, viens remplir jusqu'à l'intime le cœur de tous tes fidèles. Sans ta puissance divine, il n'est rien en aucun homme, rien qui ne soit perverti. Lave ce qui est souillé, arrose ce qui est aride, guéris ce qui est blessé. Assouplis ce qui est raide, réchauffe ce qui est froid, redresse ce qui est faussé. À tous ceux qui ont la foi et qui en toi se confient, donne tes sept dons sacrés. Donne mérite et vertu, donne le salut final, donne la joie éternelle. Amen.</p></div>

    <div class="carte"><div class="eyebrow">Règles ignatiennes du discernement (aide-mémoire)</div>
      <table class="regles">
        <tr><td>316-317</td><td>Consolation : foi, espérance, charité, paix, élan. Désolation : trouble, tiédeur, attirance vers le bas. Distinctes du plaisir et de la tristesse naturels.</td></tr>
        <tr><td>318</td><td>EN DÉSOLATION, NE JAMAIS CHANGER une décision prise en consolation. Tenir et attendre.</td></tr>

        <tr><td>321</td><td>La consolation reviendra : patience active.</td></tr>

        <tr><td>332-334</td><td>Fausse consolation : examiner début, milieu et FIN — la trajectoire trahit l'origine (« la queue du serpent »).</td></tr>
        <tr><td>n°23</td><td>Indifférence : se rendre libre avant de peser, sinon on cherche une caution, pas une volonté.</td></tr>
        <tr><td>n°175-177</td><td>Trois temps de l'élection : 1) évidence donnée (rare) ; 2) motions dans la durée (ordinaire) ; 3) raison dans le calme — colonnes priées + trois tests : l'inconnu, l'heure de la mort, le jugement.</td></tr>

  document.getElementById('retour').onclick=()=>{etat.ecran='lecture';rendre();};

  app.innerHTML=`
    <h1 class="serif" style="font-size:22px;margin:8px 0 10px">Réglages</h1>

    <div class="regl">
      <label for="heure">Heure du rappel quotidien</label>
      <input type="time" id="heure" value="${st.time}">
      <div class="note">Le rappel se déclenche chaque jour à partir de cette heure si la lecture n'est pas encore ouverte.</div>
    </div>

    <div class="regl">
      <label>Notifications
        <span class="etat ${perm==='granted'?'ok':'non'}">${perm==='granted'?'autorisées':perm==='denied'?'refusées':'à autoriser'}</span></label>
      <button class="btn secondaire" id="btn-notif">${perm==='granted'?'Envoyer une notification de test':'Autoriser les notifications'}</button>
      <div class="note">Sur Android, l'appli installée utilise la synchronisation périodique : le rappel arrive dans la journée, sans garantie d'heure exacte. Pour un rappel fiable à heure fixe, ajoutez le rappel à votre agenda ci-dessous.</div>
    </div>

    <div class="regl">
      <label>Rappel fiable via l'agenda</label>
      <button class="btn secondaire" id="btn-ics">Ajouter à mon agenda (.ics)</button>

      <label for="vdef">Version de lecture par défaut</label>

      <div class="note">Quatre versions du domaine public, hors-ligne : Segond 1910, Crampon 1923 (catholique, avec les deutérocanoniques Sagesse et Siracide), Darby, Martin 1744. Comparaison verset par verset dans l'écran Lecture (bouton ⇄).</div>
    </div>

    <div class="regl">
      <label>Parcours « Une année avec l'Esprit Saint »</label>
      <div class="note">${st.espritDebut?('Commencé le lundi '+st.espritDebut+'.'):'Pas encore commencé — lancez-le depuis l\u2019écran Aujourd\u2019hui.'}</div>
      ${st.espritDebut?'<button class="btn secondaire" id="btn-esprit-reset" style="margin-top:8px">Réinitialiser la date de départ</button>':''}
    </div>

    <hr class="filet">
    <button class="btn secondaire" id="btn-reset" style="color:var(--rouge)">Réinitialiser toute la progression</button>
    <p class="note" style="text-align:center;margin-top:14px">« Ta parole est une lampe à mes pieds. » — Ps 119:105<br>
    Données 100 % locales sur cet appareil.<br><br>
    Texte Crampon : Bible catholique du chanoine Crampon, édition 1923 — édition numérique Jean-Marie Weber pour mission-web.com (CC BY-NC-SA 3.0). Usage personnel et non commercial.</p>`;

  document.getElementById('heure').onchange=e=>{etat.settings.time=e.target.value;sauver();programmerRappelLocal();};
  document.getElementById('vdef').onchange=e=>{etat.settings.version=e.target.value;
    if(etat.settings.comparer===e.target.value)etat.settings.comparer='';sauver();};
  document.getElementById('btn-notif').onclick=async()=>{
    if(!('Notification' in window)){alert('Notifications non prises en charge par ce navigateur.');return;}
    const p=await Notification.requestPermission();
    if(p==='granted'){
      const reg=await navigator.serviceWorker.ready;
      reg.showNotification('Rappel activé 🕯️',{body:'Vous recevrez un rappel chaque jour à partir de '+etat.settings.time+'.',icon:'icon-192.png'});
      activerSyncPeriodique();
    }
    rendre();};
  document.getElementById('btn-ics').onclick=telechargerICS;
  const ber=document.getElementById('btn-esprit-reset');
  if(ber) ber.onclick=()=>{
    if(confirm('Réinitialiser la date de départ du parcours Esprit Saint ? (la progression cochée est conservée)')){
      etat.settings.espritDebut=null;sauver();rendre();}};
  document.getElementById('btn-reset').onclick=()=>{
    if(confirm('Effacer toute la progression des deux parcours ?')){

function brancherActions(){
  const pid=etat.settings.parcours;
  document.querySelectorAll('[data-lire]').forEach(el=>el.addEventListener('click',ev=>{
    if(ev.target.closest('[data-coche]'))return;
    etat.semaineOuverte=parseInt(el.dataset.lire,10);
    etat.jourOuvert=(etat.semaineOuverte===semaineCourante(pid))?Math.min(4,jourAuj()):0;
    kvPut('lastReadDay',new Date().toISOString().slice(0,10));
    etat.ecran='lecture';rendre();}));
  document.querySelectorAll('[data-coche]').forEach(el=>el.addEventListener('click',ev=>{
    ev.stopPropagation();
    const w=parseInt(el.dataset.coche,10);
    if(etat.progres[pid][w])delete etat.progres[pid][w];else etat.progres[pid][w]=true;
    kvPut('lastReadDay',new Date().toISOString().slice(0,10));
    sauver();rendre();}));
}

function rendre(){
  if(!PLANS){app.innerHTML='<div class="chargement">Chargement du plan…</div>';return;}
  rendreNav();
  ({aujourdhui:ecranAujourdhui,plan:ecranPlan,lecture:ecranLecture,prieres:ecranPrieres,reglages:ecranReglages})[etat.ecran]();
  window.scrollTo(0,0);
}

/* ================= RAPPELS ================= */
let minuterie=null;
function programmerRappelLocal(){
  if(minuterie)clearTimeout(minuterie);
  if(!('Notification'in window)||Notification.permission!=='granted')return;
  const [h,m]=etat.settings.time.split(':').map(Number);
  const cible=new Date();cible.setHours(h,m,0,0);
  if(cible<=new Date())cible.setDate(cible.getDate()+1);
  minuterie=setTimeout(async()=>{
    const reg=await navigator.serviceWorker.ready;
    reg.active&&reg.active.postMessage('show-reminder');
    programmerRappelLocal();
  },cible-new Date());
}
async function activerSyncPeriodique(){
  try{
    const reg=await navigator.serviceWorker.ready;
    if('periodicSync' in reg){
      const perm=await navigator.permissions.query({name:'periodic-background-sync'});
      if(perm.state==='granted')
        await reg.periodicSync.register('rappel-lecture',{minInterval:6*60*60*1000});
    }
  }catch(e){}
}
function telechargerICS(){
  const [h,m]=etat.settings.time.split(':');
  const d=new Date();
  const dt=d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'T'+h.padStart(2,'0')+m.padStart(2,'0')+'00';
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//LectureEsprit//FR',
    'BEGIN:VEVENT','UID:lecture-esprit-rappel@local',
    'DTSTART;TZID=Africa/Abidjan:'+dt,
    'RRULE:FREQ=DAILY',
    'SUMMARY:Lecture & prière du jour',
    "DESCRIPTION:Ouvrir l'appli pour la lecture et la méditation du jour.",
    'BEGIN:VALARM','TRIGGER:PT0M','ACTION:DISPLAY',
    'DESCRIPTION:Lecture du jour','END:VALARM','END:VEVENT','END:VCALENDAR'].join('\r\n');
  const a=document.createElement('a');
  a.href='data:text/calendar;charset=utf-8,'+encodeURIComponent(ics);
  a.download='rappel-lecture-quotidienne.ics';a.click();
}

/* ================= DÉMARRAGE ================= */
if('serviceWorker'in navigator){
  navigator.serviceWorker.register('sw.js').then(()=>{activerSyncPeriodique();});
}
kvPut('settings',etat.settings);
programmerRappelLocal();
fetch('data/plans.json').then(r=>r.json()).then(p=>{PLANS=p;rendre();})
  .catch(()=>{app.innerHTML='<div class="carte">Le plan n\u2019a pas pu être chargé. Vérifiez la connexion pour la première ouverture.</div>';});
chargerVersion(etat.settings.version).catch(()=>{});
rendre();
</script>
